<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Body Reader — POC 9</title>
  <script src="charstats.js"></script><!-- optional; book-tab stats; generate with charstats.py -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: "Segoe UI", sans-serif;
      padding: 2rem;
      max-width: 56rem;
    }

    /* ── File picker ── */
    #loader {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 1.2rem;
    }
    #loader p { font-size: 0.85rem; color: #555; letter-spacing: 0.05em; }
    #file-btn {
      background: #1a1a1a; color: #888; border: 1px solid #333;
      padding: 0.55rem 1.4rem; font-size: 0.9rem; cursor: pointer;
      border-radius: 3px; letter-spacing: 0.06em;
    }
    #file-btn:hover { background: #222; color: #ddd; border-color: #555; }
    #file-input { display: none; }
    #loader-error { font-size: 0.78rem; color: #c05050; display: none; }

    /* ── Navigation ── */
    #reader { display: none; }
    .nav {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 2.5rem; flex-wrap: wrap;
    }
    .nav button {
      background: #1a1a1a; color: #888; border: 1px solid #333;
      padding: 0.3rem 0.9rem; font-size: 0.85rem; cursor: pointer;
      border-radius: 3px; letter-spacing: 0.05em;
    }
    .nav button:hover:not(:disabled) { background: #262626; color: #ddd; border-color: #555; }
    .nav button:disabled { opacity: 0.3; cursor: default; }
    .nav-label { font-size: 0.72rem; color: #555; letter-spacing: 0.06em; }
    .nav-sep { flex: 1; }

    .mode-slider { display: flex; align-items: center; gap: 0.4rem; }
    .mode-lbl { display: flex; flex-direction: column; align-items: center; line-height: 1.25; }
    .ml-zh { font-size: 1.3rem;  color: #f0d090; }
    .ml-py { font-size: 0.78rem; color: #6ab0f5; }
    .ml-en { font-size: 0.68rem; color: #7dd87d; }
    .mode-slider input[type="range"] {
      -webkit-appearance: none; width: 48px; height: 3px;
      background: #383838; border-radius: 2px; outline: none; cursor: pointer;
    }
    .mode-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 11px; height: 11px;
      background: #666; border-radius: 50%; cursor: pointer;
    }
    .mode-slider input[type="range"]:hover::-webkit-slider-thumb { background: #bbb; }
    #sl-freq { width: 96px; }

    /* ── Visibility modes ── */
    /* base fading (only active when none of the three body classes is set) */
    .word .row-b span.faded { opacity: 0.1; }
    .word.faded-gloss .row-c { opacity: 0.1; }
    /* slider 0: hide all */
    body.pinyin-0 .row-b { display: none; }
    body.gloss-0  .row-c { display: none; }
    /* slider 1 (½): known at 0.1 opacity, unknown at full — base rules handle this */
    /* slider 2 (1): show all at full opacity */
    body.pinyin-2 .row-b span.faded { opacity: 1; }
    body.gloss-2  .word.faded-gloss .row-c { opacity: 1; }

    /* ── Sentence blocks ── */
    .sentence-block { margin-bottom: 2.8rem; }
    .sentence-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.1rem; }
    .row-label {
      font-size: 0.62rem; color: #444; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 0.5rem 0 0.3rem;
    }
    .sentence-header .row-label { padding: 0; }
    button.speak {
      background: none; border: none; color: #555; font-size: 1rem;
      cursor: pointer; padding: 0.1rem 0.3rem; line-height: 1;
    }
    button.speak:hover { color: #aaa; }
    button.speak.playing { color: #e05050; }

    /* ── Word grid ── */
    .sentence { display: flex; flex-wrap: wrap; align-items: flex-start; row-gap: 1.2rem; }
    .word { display: inline-flex; flex-direction: column; }

    .word .row-a { display: flex; }
    .word .row-a span {
      width: 2.6rem; flex-shrink: 0; text-align: center;
      font-size: 1.9rem;
      color: var(--char-color, #f0d090);
      padding: 0.25rem 0.05rem 0.1rem; cursor: default;
    }
    .word .row-a span.highlight { color: #e05050; }
    .word.word-pinned .row-a span { color: #e05050; }

    .word .row-b { display: flex; user-select: none; }
    .word .row-b span {
      width: 2.6rem; flex-shrink: 0; text-align: center;
      font-size: 0.73rem; color: #6ab0f5; padding: 0.05rem 0.05rem 0.3rem;
    }
    .word:not(.punct) .row-b span { cursor: pointer; }

    .word .row-c {
      font-size: 0.72rem; text-align: center; color: #7dd87d;
      padding: 0.25rem 0.1rem;
      border-top: 1px solid #2d2d2d; border-bottom: 1px solid #2d2d2d;
      border-right: 1px solid #222; min-height: 1.55rem; user-select: none;
    }
    .word:not(.punct) .row-c { cursor: pointer; }
    .word.punct .row-a span { color: #666; font-size: 1.5rem; }
    .row-d { padding: 0.6rem 0.2rem 0; font-size: 0.95rem; color: #999; font-style: italic; }

    /* ── Glossary modal ── */
    .g-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 100;
      align-items: center; justify-content: center;
    }
    .g-overlay.open { display: flex; }
    .g-modal {
      background: #161616; border: 1px solid #2e2e2e; border-radius: 4px;
      width: 88vw; max-width: 960px; height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .g-head {
      display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
      padding: 0.55rem 0.9rem; border-bottom: 1px solid #222; flex-shrink: 0;
    }
    .g-title { font-size: 0.7rem; color: #444; letter-spacing: 0.07em; flex: 1; }
    .g-filters { display: flex; gap: 0.35rem; }
    .g-filter {
      background: #1a1a1a; border: 1px solid #252525; cursor: pointer; border-radius: 3px;
      padding: 0.2rem 0.5rem; display: flex; flex-direction: column; align-items: center; line-height: 1.25;
    }
    .g-filter .ml-zh { font-size: 1.1rem;  color: #484848; }
    .g-filter .ml-py { font-size: 0.72rem; color: #2d5070; }
    .g-filter .ml-en { font-size: 0.64rem; color: #2d502d; }
    .g-filter.active .ml-zh { color: #f0d090; }
    .g-filter.active .ml-py { color: #6ab0f5; }
    .g-filter.active .ml-en { color: #7dd87d; }
    .g-filter:hover .ml-zh { color: #bbb; }
    .g-filter.drag-target { outline: 1px solid #6ab0f5; background: #101828; }
    .g-filter.drag-target .ml-zh { color: #bbb; }
    #g-close {
      background: none; border: none; color: #3a3a3a; font-size: 1.1rem;
      cursor: pointer; padding: 0.1rem 0.35rem; line-height: 1;
    }
    #g-close:hover { color: #bbb; }
    .g-stats {
      padding: 0.28rem 0.9rem; font-size: 0.63rem; color: #333;
      border-bottom: 1px solid #1c1c1c; flex-shrink: 0;
    }
    .g-body { overflow-y: auto; flex: 1; }
    .g-table { width: 100%; border-collapse: collapse; }
    .g-table tr:hover td { background: #1b1b1b; }
    @keyframes g-flash { 0% { background: #2e2a10; } 100% { background: transparent; } }
    .g-table tr.g-highlight td { animation: g-flash 1.8s ease-out forwards; }
    .g-table td { padding: 0.22rem 0.5rem; border-bottom: 1px solid #1c1c1c; vertical-align: middle; }
    .g-td-rank  { color: #2c2c2c; font-size: 0.6rem; text-align: right; width: 2.2rem; }
    .g-drag-handle { color: #383838; font-size: 0.9rem; cursor: grab; user-select: none;
                     padding: 0 0.3rem; width: 1.2rem; text-align: center; }
    .g-group-hdr td { padding: 0.1rem 0.4rem; font-size: 0.62rem; color: #7a6020;
                      letter-spacing: 0.08em; border-top: 1px solid #2a2a2a; }
    .g-grouped-char td:first-child { color: #252510; }
    .g-grouped-char td { border-left: 2px solid #1e1e0a; }
    .g-group-input { background: transparent; border: none; border-bottom: 1px solid #2a2a2a;
                     color: #7a6020; font-size: 0.62rem; width: 5rem; outline: none; }
    .g-group-input:focus { border-bottom-color: #a07a30; }
    .g-table tr.drop-above td { border-top: 2px solid #6ab0f5 !important; }
    .g-table tr.drop-below td { border-bottom: 2px solid #6ab0f5 !important; }
    .g-td-ch   { font-size: 1.9rem; color: #f0d090; width: 2.6rem; text-align: center; line-height: 1; padding: 0.1rem 0.5rem; white-space: nowrap; }
    .g-td-py   { font-size: 0.73rem; color: #6ab0f5; width: 4.5rem; }
    .g-td-gl   { font-size: 0.68rem; color: #888; max-width: 14rem; }
    .g-td-n    { font-size: 0.6rem; color: #333; text-align: right; width: 2.2rem; }
    .g-td-kn   { width: 2rem; text-align: center; }
    .g-kn-btn  {
      background: none; border: 1px solid #242424; color: #2e2e2e;
      font-size: 0.7rem; border-radius: 2px; cursor: pointer; padding: 0.05rem 0.3rem; line-height: 1.4;
    }
    .g-kn-btn.on { color: #7dd87d; border-color: #385038; }
    .g-kn-btn:hover { border-color: #555; color: #aaa; }
    .g-chips { display: flex; flex-wrap: wrap; gap: 0.28rem; padding: 0.1rem 0; }
    .g-chip {
      position: relative; display: inline-flex; flex-direction: column; align-items: center;
      border: 1px solid #202020; border-radius: 2px; padding: 0.08rem 0.32rem 0.08rem 0.55rem;
      cursor: pointer;
    }
    .g-chip:hover { border-color: #3a3a3a; background: #1c1c1c; }
    .g-chip-speak { position: absolute; top: 2px; left: 2px; font-size: 0.55rem;
                    color: #444; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
    .g-chip-speak:hover { color: #aaa; }
    .g-chip-speak.playing { color: #e05050; }
    .g-chip .wc-zh { font-size: 1.9rem;  color: #f0d090; line-height: 1.3; }
    .g-chip .wc-py { font-size: 0.73rem; color: #6ab0f5; line-height: 1.2; }
    .g-chip .wc-en { font-size: 0.72rem; color: #7dd87d; line-height: 1.2; }
    #btn-glossary {
      background: #1a1a1a; border: 1px solid #333; cursor: pointer;
      border-radius: 3px; padding: 0.2rem 0.5rem; line-height: 1;
    }
    #btn-glossary:hover { background: #262626; border-color: #555; }
    .g-actions { display: flex; gap: 0.35rem; align-items: center; }
    .g-act-btn {
      background: #1a1a1a; border: 1px solid #252525; color: #444;
      font-size: 0.65rem; cursor: pointer; border-radius: 2px; padding: 0.2rem 0.5rem; letter-spacing: 0.04em;
    }
    .g-act-btn:hover { color: #aaa; border-color: #555; }
    .g-act-btn.danger:hover { color: #c05050; border-color: #7a2a2a; }
  </style>
</head>
<body>

  <div id="loader">
    <p>Select a chapter data file (e.g. <code>chapter1.js</code>) to begin.</p>
    <button id="file-btn">Choose file…</button>
    <input type="file" id="file-input" accept=".js">
    <span id="loader-error"></span>
  </div>

  <div id="reader">
    <div class="nav">
      <button id="btn-prev">&#x2190; Prev</button>
      <span class="nav-label" id="nav-label"></span>
      <button id="btn-next">Next &#x2192;</button>
      <span class="nav-sep"></span>
      <label class="mode-slider">
        <span class="mode-lbl"><span class="ml-zh">频</span><span class="ml-py">pín</span><span class="ml-en">freq</span></span>
        <input type="range" id="sl-freq" min="0" max="4" step="0.01" value="4">
      </label>
      <label class="mode-slider">
        <span class="mode-lbl"><span class="ml-zh">拼</span><span class="ml-py">pīn</span><span class="ml-en">pinyin</span></span>
        <input type="range" id="sl-pinyin" min="0" max="2" step="1" value="1">
      </label>
      <label class="mode-slider">
        <span class="mode-lbl"><span class="ml-zh">词</span><span class="ml-py">cí</span><span class="ml-en">gloss</span></span>
        <input type="range" id="sl-gloss" min="0" max="2" step="1" value="1">
      </label>
      <button id="btn-glossary">
        <span class="mode-lbl"><span class="ml-zh">汇</span><span class="ml-py">huì</span><span class="ml-en">vocab</span></span>
      </button>
    </div>
    <div id="root"></div>
  </div>

  <!-- Glossary modal -->
  <div id="g-overlay" class="g-overlay">
    <div class="g-modal">
      <div class="g-head">
        <span class="g-title">词汇表 · vocabulary</span>
        <div class="g-filters">
          <button class="g-filter" data-f="known-chars">
            <span class="ml-zh">熟字</span><span class="ml-py">shú zì</span><span class="ml-en">known chars</span>
          </button>
          <button class="g-filter" data-f="known-words">
            <span class="ml-zh">熟词</span><span class="ml-py">shú cí</span><span class="ml-en">known words</span>
          </button>
          <button class="g-filter active" data-f="paragraph">
            <span class="ml-zh">段</span><span class="ml-py">duàn</span><span class="ml-en">para</span>
          </button>
          <button class="g-filter" data-f="chapter">
            <span class="ml-zh">章</span><span class="ml-py">zhāng</span><span class="ml-en">chapter</span>
          </button>
          <button class="g-filter" data-f="book">
            <span class="ml-zh">书</span><span class="ml-py">shū</span><span class="ml-en">book</span>
          </button>
        </div>
        <div class="g-actions">
          <button id="g-download" class="g-act-btn">↓ save known</button>
          <button id="g-load-trigger" class="g-act-btn">↑ load known</button>
          <input type="file" id="g-load-input" accept=".json" style="display:none">
          <button id="g-clear" class="g-act-btn danger">✕ clear all</button>
        </div>
        <button id="g-close">✕</button>
      </div>
      <div id="g-stats" class="g-stats"></div>
      <div id="g-body" class="g-body"></div>
    </div>
  </div>

  <script>
    // ── File loading ──────────────────────────────────────────────────────────
    document.getElementById('file-btn').addEventListener('click', () =>
      document.getElementById('file-input').click());

    document.getElementById('file-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const fr = new FileReader();
      fr.onload = e => {
        const err = document.getElementById('loader-error');
        try { eval(e.target.result); } catch (ex) {
          err.style.display = 'block';
          err.textContent = 'Error loading file: ' + ex.message;
          return;
        }
        const data = window.CHAPTER1 || window.PARAGRAPHS;
        if (!Array.isArray(data) || !data.length) {
          err.style.display = 'block';
          err.textContent = 'File loaded but no data found. Expected window.CHAPTER1 or window.PARAGRAPHS.';
          return;
        }
        err.style.display = 'none';
        initReader(data);
      };
      fr.readAsText(file);
    });

    // ── TTS ──────────────────────────────────────────────────────────────────
    let voices = speechSynthesis.getVoices();
    speechSynthesis.addEventListener('voiceschanged', () => { voices = speechSynthesis.getVoices(); });
    let activeBtn = null;

    function stopCurrent() {
      speechSynthesis.cancel();
      if (activeBtn) { activeBtn.textContent = '▶'; activeBtn.classList.remove('playing'); activeBtn = null; }
    }
    function speak(text, btn = null, rate = 0.3) {
      if (btn && activeBtn === btn) { stopCurrent(); return; }
      stopCurrent();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = rate;
      const allVoices = speechSynthesis.getVoices().length ? speechSynthesis.getVoices() : voices;
      const v = allVoices.find(v => v.lang.startsWith('zh'));
      if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = 'zh-CN'; }
      activeBtn = btn;
      if (btn) { btn.textContent = '■'; btn.classList.add('playing'); }
      const reset = () => { if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); } if (activeBtn === btn) activeBtn = null; };
      u.onend = reset; u.onerror = reset;
      speechSynthesis.resume();
      speechSynthesis.speak(u);
    }

    // ── Fade persistence ─────────────────────────────────────────────────────
    // Keys are Chinese characters/words (not pinyin/English) so data survives pipeline reruns
    function migrateKey(newKey, ...oldKeys) {
      if (localStorage.getItem(newKey)) return;
      for (const k of oldKeys) { const v = localStorage.getItem(k); if (v) { localStorage.setItem(newKey, v); localStorage.removeItem(k); return; } }
    }
    migrateKey('faded-chars', 'faded-pinyin');
    migrateKey('faded-words', 'faded-gloss');
    // fadedCharsOrder: insertion-order array (source of truth for order + membership)
    // fadedChars: Set derived from it, kept in sync, for O(1) lookup elsewhere
    const fadedCharsOrder   = JSON.parse(localStorage.getItem('faded-chars') || '[]');
    const fadedChars        = new Set(fadedCharsOrder);
    const fadedCharGroups   = new Map(Object.entries(
                                JSON.parse(localStorage.getItem('faded-char-groups') || '{}')));
    const fadedWordsOrder   = JSON.parse(localStorage.getItem('faded-words') || '[]');
    const fadedWords        = new Set(fadedWordsOrder);
    const fadedWordGroups   = new Map(Object.entries(
                                JSON.parse(localStorage.getItem('faded-word-groups') || '{}')));
    const pinyinSpansByChar = new Map();
    const wordsByKey        = new Map();
    let pinnedWordKey      = null;
    let clearPinListener   = null;
    // type: 'char'|'grouped-char'|'group' for known-chars tab
    //       'word'|'grouped-word'|'word-group' for known-words tab
    let dragInfo           = null;

    function saveFaded() {
      localStorage.setItem('faded-chars',       JSON.stringify(fadedCharsOrder));
      localStorage.setItem('faded-char-groups', JSON.stringify(Object.fromEntries(fadedCharGroups)));
      localStorage.setItem('faded-words',       JSON.stringify(fadedWordsOrder));
      localStorage.setItem('faded-word-groups', JSON.stringify(Object.fromEntries(fadedWordGroups)));
    }
    function addKnownChar(ch) {
      if (!fadedChars.has(ch)) { fadedChars.add(ch); fadedCharsOrder.push(ch); }
    }
    function removeKnownChar(ch) {
      fadedChars.delete(ch);
      fadedCharGroups.delete(ch);
      const i = fadedCharsOrder.indexOf(ch);
      if (i >= 0) fadedCharsOrder.splice(i, 1);
    }
    function toggleKnownChar(ch) {
      fadedChars.has(ch) ? removeKnownChar(ch) : addKnownChar(ch);
    }
    function addKnownWord(w) {
      if (!fadedWords.has(w)) { fadedWords.add(w); fadedWordsOrder.push(w); }
    }
    function removeKnownWord(w) {
      fadedWords.delete(w);
      fadedWordGroups.delete(w);
      const i = fadedWordsOrder.indexOf(w);
      if (i >= 0) fadedWordsOrder.splice(i, 1);
    }
    function applyFaded() {
      for (const [ch, spans] of pinyinSpansByChar)
        for (const s of spans) s.classList.toggle('faded', fadedChars.has(ch));
      for (const [key, divs] of wordsByKey)
        for (const div of divs) div.classList.toggle('faded-gloss', fadedWords.has(key));
    }

    // ── Visibility modes ──────────────────────────────────────────────────────
    // slider 0=hide all, 1=½ hide known, 2=show all · sliders reset on every page load
    function loadInt(key, def) { const v = parseInt(localStorage.getItem(key), 10); return isNaN(v) ? def : v; }
    let pinyinMode = 1;   // ½: known pinyin dimmed
    let glossMode  = 1;   // ½: known glosses dimmed
    let freqSlider = 4;   // rightmost: rarest chars highlighted

    function applyModes() {
      const b = document.body;
      b.classList.toggle('pinyin-0', pinyinMode === 0);
      b.classList.toggle('pinyin-1', pinyinMode === 1);
      b.classList.toggle('pinyin-2', pinyinMode === 2);
      b.classList.toggle('gloss-0',  glossMode  === 0);
      b.classList.toggle('gloss-1',  glossMode  === 1);
      b.classList.toggle('gloss-2',  glossMode  === 2);
      document.getElementById('sl-pinyin').value = pinyinMode;
      document.getElementById('sl-gloss').value  = glossMode;
      document.getElementById('sl-freq').value   = freqSlider;
      applyFreqColors();
    }

    document.getElementById('sl-pinyin').addEventListener('input', e => {
      pinyinMode = parseInt(e.target.value, 10); applyModes();
    });
    document.getElementById('sl-gloss').addEventListener('input', e => {
      glossMode = parseInt(e.target.value, 10); applyModes();
    });
    document.getElementById('sl-freq').addEventListener('input', e => {
      freqSlider = parseFloat(e.target.value); applyFreqColors();
    });

    // ── Character frequency coloring ─────────────────────────────────────────
    // freqSlider ∈ [0,4]: maps log10(rank), so middle (2) = rank 100 = 100th most common char.
    // Color is a Gaussian spotlight (sigma=1 decade) centered on the selected rank.
    const charFreq = new Map();
    const charRank = new Map();

    // Book-wide stats from charstats.js (window.CHARSTATS = {ch: count, ...} sorted desc)
    const bookCharFreq = new Map();
    const bookCharRank = new Map();
    if (window.CHARSTATS) {
      let rank = 1;
      for (const [ch, count] of Object.entries(window.CHARSTATS)) {
        bookCharFreq.set(ch, count);
        bookCharRank.set(ch, rank++);
      }
    }

    function buildCharFreq(data) {
      charFreq.clear();
      for (const para of data)
        for (const sent of para.sentences)
          for (const w of sent.words)
            if (!w.punct)
              for (const ch of w.chars)
                charFreq.set(ch, (charFreq.get(ch) || 0) + 1);
      const sorted = [...charFreq.entries()].sort((a, b) => b[1] - a[1]);
      charRank.clear();
      sorted.forEach(([ch], i) => charRank.set(ch, i + 1));
    }

    function applyFreqColors() {
      for (const span of document.querySelectorAll('.word:not(.punct) .row-a span')) {
        const rank = charRank.get(span.textContent) || (charRank.size + 1);
        const d = Math.log10(rank) - freqSlider;
        const t = 1 / (1 + Math.exp(3 * d));  // sigmoid: common chars → 1, rare → 0
        span.style.setProperty('--char-color',
          `hsl(40, ${Math.round(5 + t * 71)}%, ${Math.round(38 + t * 37)}%)`);
      }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderSentence(sent) {
      const ttsText = sent.words.map(w => w.chars.join('')).join('');

      const block = document.createElement('div');
      block.className = 'sentence-block';

      const header = document.createElement('div');
      header.className = 'sentence-header';
      const btn = document.createElement('button');
      btn.className = 'speak'; btn.title = 'Read aloud (slow)'; btn.textContent = '▶';
      btn.addEventListener('click', () => speak(ttsText, btn));
      header.appendChild(btn);
      const lbl = document.createElement('div');
      lbl.className = 'row-label'; lbl.textContent = '(a) original · (b) pinyin · (c) words';
      header.appendChild(lbl);
      block.appendChild(header);

      const flow = document.createElement('div');
      flow.className = 'sentence';

      for (const w of sent.words) {
        const wordKey = w.chars.join('');
        const div = document.createElement('div');
        div.className = 'word' + (w.punct ? ' punct' : '');

        const rowA = document.createElement('div'); rowA.className = 'row-a';
        for (const ch of w.chars) {
          const s = document.createElement('span'); s.textContent = ch;
          rowA.appendChild(s);
        }
        if (!w.punct) rowA.addEventListener('dblclick', e => {
          if (e.target.tagName === 'SPAN') openGlossaryForChar(e.target.textContent);
        });

        const rowB = document.createElement('div'); rowB.className = 'row-b';
        const pinyins = w.pinyins || w.chars.map(() => '');
        w.chars.forEach((ch, i) => {
          const s = document.createElement('span'); s.textContent = pinyins[i];
          if (!w.punct && pinyins[i]) {
            if (!pinyinSpansByChar.has(ch)) pinyinSpansByChar.set(ch, []);
            pinyinSpansByChar.get(ch).push(s);
            s.addEventListener('click', () => {
              toggleKnownChar(ch);
              saveFaded(); applyFaded();
            });
          }
          rowB.appendChild(s);
        });

        const rowC = document.createElement('div');
        rowC.className = 'row-c'; rowC.textContent = w.gloss || '';

        div.appendChild(rowA); div.appendChild(rowB); div.appendChild(rowC);
        flow.appendChild(div);

        if (!w.punct) {
          if (!wordsByKey.has(wordKey)) wordsByKey.set(wordKey, []);
          wordsByKey.get(wordKey).push(div);
          rowC.addEventListener('click', () => {
            fadedWords.has(wordKey) ? removeKnownWord(wordKey) : addKnownWord(wordKey);
            saveFaded(); applyFaded();
          });
        }
      }

      block.appendChild(flow);
      const lblD = document.createElement('div'); lblD.className = 'row-label'; lblD.textContent = '(d) translation';
      block.appendChild(lblD);
      const rowD = document.createElement('div'); rowD.className = 'row-d'; rowD.textContent = sent.translation;
      block.appendChild(rowD);

      return block;
    }

    // ── Paragraph navigation ─────────────────────────────────────────────────
    let PARAGRAPHS_DATA = null;

    function showParagraph(index) {
      stopCurrent();
      clearWordPin();
      pinyinSpansByChar.clear(); wordsByKey.clear();
      paraChars.clear();
      paraWords.clear();
      paraCharFreq.clear();
      for (const s of PARAGRAPHS_DATA[index].sentences)
        for (const w of s.words)
          if (!w.punct) {
            for (const ch of w.chars) {
              paraChars.add(ch);
              paraCharFreq.set(ch, (paraCharFreq.get(ch) || 0) + 1);
            }
            paraWords.add(w.chars.join(''));
          }
      const root = document.getElementById('root');
      root.innerHTML = '';

      for (const s of PARAGRAPHS_DATA[index].sentences)
        root.appendChild(renderSentence(s));

      applyFaded();
      applyModes();

      // Hover highlight: group spans by character
      const charSpans = Array.from(document.querySelectorAll('.word:not(.punct) .row-a span'));
      const byChar = new Map();
      for (const s of charSpans) {
        if (!byChar.has(s.textContent)) byChar.set(s.textContent, []);
        byChar.get(s.textContent).push(s);
      }
      for (const s of charSpans) {
        const g = byChar.get(s.textContent);
        s.addEventListener('mouseenter', () => { for (const x of g) x.classList.add('highlight'); });
        s.addEventListener('mouseleave', () => { for (const x of g) x.classList.remove('highlight'); });
      }

      const total = PARAGRAPHS_DATA.length;
      document.getElementById('nav-label').textContent = `Paragraph ${index + 1} / ${total}`;
      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === total - 1;
      localStorage.setItem('paragraph-index', index);
      window.scrollTo(0, 0);
    }

    function initReader(data) {
      PARAGRAPHS_DATA = data;
      buildCharFreq(data);
      buildGlossary(data);
      document.getElementById('loader').style.display = 'none';
      document.getElementById('reader').style.display = 'block';

      const total = data.length;
      let cur = parseInt(localStorage.getItem('paragraph-index') || '0', 10);
      if (cur >= total) cur = 0;

      document.getElementById('btn-prev').addEventListener('click', () => {
        const i = parseInt(localStorage.getItem('paragraph-index') || '0', 10);
        if (i > 0) showParagraph(i - 1);
      });
      document.getElementById('btn-next').addEventListener('click', () => {
        const i = parseInt(localStorage.getItem('paragraph-index') || '0', 10);
        if (i < total - 1) showParagraph(i + 1);
      });

      showParagraph(cur);
    }

    // ── Glossary ─────────────────────────────────────────────────────────────
    const charToWords   = new Map();
    const wordDataByKey = new Map();  // word key → {chars, pinyins, gloss}
    const wordFreq      = new Map();  // word key → count across chapter
    const paraChars     = new Set();
    const paraWords     = new Set();
    const paraCharFreq  = new Map();  // char→count within current paragraph
    let glossaryFilter    = 'paragraph';
    let knownSnapshot     = null;  // known-chars tab: frozen fadedCharsOrder.slice() at tab-open
    let virtualKnown      = null;  // known-chars tab: working copy of fadedChars; committed on leave
    let knownWordsSnapshot = null; // known-words tab: frozen fadedWordsOrder.slice() at tab-open
    let virtualKnownWords  = null; // known-words tab: working copy of fadedWords; committed on leave

    function buildGlossary(data) {
      charToWords.clear();
      wordDataByKey.clear();
      wordFreq.clear();
      const seen = new Set();
      const glossFreq = new Map(); // wordKey → Map<gloss, count>
      for (const para of data)
        for (const sent of para.sentences)
          for (const w of sent.words)
            if (!w.punct) {
              const key = w.chars.join('');
              const gloss = w.gloss || '';
              wordFreq.set(key, (wordFreq.get(key) || 0) + 1);
              if (gloss) {
                if (!glossFreq.has(key)) glossFreq.set(key, new Map());
                const gm = glossFreq.get(key);
                gm.set(gloss, (gm.get(gloss) || 0) + 1);
              }
              if (!seen.has(key)) {
                seen.add(key);
                const wd = { chars: w.chars, pinyins: w.pinyins || [], gloss, glosses: gloss ? [gloss] : [] };
                wordDataByKey.set(key, wd);
                for (const ch of w.chars) {
                  if (!charToWords.has(ch)) charToWords.set(ch, []);
                  charToWords.get(ch).push(wd);
                }
              } else if (gloss) {
                const wd = wordDataByKey.get(key);
                if (wd && !wd.glosses.includes(gloss)) wd.glosses.push(gloss);
              }
            }
      for (const [key, wd] of wordDataByKey) {
        const gm = glossFreq.get(key);
        if (gm && wd.glosses.length > 1)
          wd.glosses.sort((a, b) => (gm.get(b) || 0) - (gm.get(a) || 0));
      }
    }

    function makeWordChips(wordObjs) {
      const chips = document.createElement('div'); chips.className = 'g-chips';
      const sorted = wordObjs.slice().sort((a, b) =>
        (wordFreq.get(b.chars.join('')) || 0) - (wordFreq.get(a.chars.join('')) || 0));
      for (const w of sorted.slice(0, 8)) {
        const wKey = w.chars.join('');
        const chip = document.createElement('div'); chip.className = 'g-chip';
        const spk = document.createElement('button'); spk.className = 'g-chip-speak'; spk.textContent = '▶';
        spk.title = 'Read aloud';
        spk.addEventListener('click', e => { e.stopPropagation(); speak(wKey, spk, 0.7); });
        const zh = document.createElement('div'); zh.className = 'wc-zh'; zh.textContent = wKey;
        const py = document.createElement('div'); py.className = 'wc-py'; py.textContent = w.pinyins.join('·');
        const en = document.createElement('div'); en.className = 'wc-en';
        en.textContent = w.glosses && w.glosses.length > 0 ? w.glosses.join(' / ') : (w.gloss || '');
        chip.appendChild(spk); chip.appendChild(zh); chip.appendChild(py); chip.appendChild(en);
        chip.addEventListener('dblclick', e => {
          e.stopPropagation();
          if (!(wordsByKey.get(wKey) || []).length) return;
          closeGlossary();
          pinWord(wKey);
        });
        chips.appendChild(chip);
      }
      return chips;
    }

    function makeKnownButton(ch, isKnown, onToggle) {
      const tdKn = document.createElement('td'); tdKn.className = 'g-td-kn';
      const kb = document.createElement('button'); kb.className = 'g-kn-btn';
      kb.textContent = isKnown ? '✓' : '·';
      if (isKnown) kb.classList.add('on');
      kb.addEventListener('click', onToggle);
      tdKn.appendChild(kb);
      return tdKn;
    }

    function makePinyinCell(ch) {
      const words = charToWords.get(ch) || [];
      const pySet = new Set();
      for (const w of words) {
        const i = w.chars.indexOf(ch);
        if (i >= 0 && w.pinyins[i]) pySet.add(w.pinyins[i]);
      }
      const td = document.createElement('td'); td.className = 'g-td-py';
      td.textContent = [...pySet].join(' / ');
      return td;
    }

    // Build a list of display items from fadedCharsOrder + fadedCharGroups.
    // Each item is either {type:'char', ch} (ungrouped) or {type:'group', name, chars:[...]}.
    // All chars of the same group name are guaranteed adjacent in the result.
    function computeKnownDisplayItems() {
      const items = [];
      for (const ch of fadedCharsOrder) {
        const grp = fadedCharGroups.get(ch) || '';
        if (!grp) {
          items.push({ type: 'char', ch });
        } else {
          const last = items[items.length - 1];
          if (last && last.type === 'group' && last.name === grp)
            last.chars.push(ch);
          else
            items.push({ type: 'group', name: grp, chars: [ch] });
        }
      }
      return items;
    }

    // Write display items back into fadedCharsOrder and fadedCharGroups.
    function serializeKnownDisplayItems(items) {
      fadedCharsOrder.length = 0;
      fadedCharGroups.clear();
      for (const item of items) {
        if (item.type === 'char') {
          fadedCharsOrder.push(item.ch);
        } else {
          for (const ch of item.chars) {
            fadedCharsOrder.push(ch);
            fadedCharGroups.set(ch, item.name);
          }
        }
      }
    }

    // Shared drop logic. insertBefore: true = above the row, false = below.
    // Group drags never merge into other groups; char drags joining a group
    // is via insertBefore=false on the group header (= append as first char).
    function applyKnownDrop(targetType, targetCh, targetGroupName, insertBefore) {
      if (!dragInfo) return;
      // Self-drop: dragging onto the same item — nothing to do
      if (dragInfo.type === 'group' && targetType === 'group' && dragInfo.groupName === targetGroupName) return;
      if ((dragInfo.type === 'char' || dragInfo.type === 'grouped-char') && dragInfo.ch === targetCh) return;
      commitKnownTab();
      const items = computeKnownDisplayItems();

      if (dragInfo.type === 'group') {
        // ── Moving an entire group ──────────────────────────────────────────────
        // For group drags hitting a grouped-char row, snap to that char's group boundary.
        const si = items.findIndex(i => i.type === 'group' && i.name === dragInfo.groupName);
        if (si < 0) return;
        const [grp] = items.splice(si, 1);  // remove first (adjusts indices below)

        let ti;
        if (targetType === 'group') {
          ti = items.findIndex(i => i.type === 'group' && i.name === targetGroupName);
        } else if (targetType === 'char') {
          ti = items.findIndex(i => i.type === 'char' && i.ch === targetCh);
        } else {
          // grouped-char: snap to the boundary of that char's group
          ti = items.findIndex(i => i.type === 'group' && i.name === targetGroupName);
        }
        if (ti < 0) ti = items.length;
        else if (!insertBefore) ti++;
        items.splice(ti, 0, grp);

      } else {
        // ── Moving a single char ────────────────────────────────────────────────
        const srcCh = dragInfo.ch;

        // Remove from source
        if (dragInfo.type === 'char') {
          const si = items.findIndex(i => i.type === 'char' && i.ch === srcCh);
          if (si < 0) return;
          items.splice(si, 1);
        } else {
          const sg = items.find(i => i.type === 'group' && i.name === dragInfo.groupName);
          if (!sg) return;
          sg.chars.splice(sg.chars.indexOf(srcCh), 1);
          if (sg.chars.length === 0) items.splice(items.indexOf(sg), 1);
        }

        if (targetType === 'group') {
          if (insertBefore) {
            // Above header → ungrouped before this group
            const ti = items.findIndex(i => i.type === 'group' && i.name === targetGroupName);
            items.splice(ti < 0 ? items.length : ti, 0, { type: 'char', ch: srcCh });
          } else {
            // Below header → first position inside the group
            const tg = items.find(i => i.type === 'group' && i.name === targetGroupName);
            if (tg) tg.chars.unshift(srcCh);
          }
        } else if (targetType === 'char') {
          const ti = items.findIndex(i => i.type === 'char' && i.ch === targetCh);
          const ins = ti < 0 ? items.length : (insertBefore ? ti : ti + 1);
          items.splice(ins, 0, { type: 'char', ch: srcCh });
        } else {
          // grouped-char: insert within its group before or after the target char
          const tg = items.find(i => i.type === 'group' && i.name === targetGroupName);
          if (tg) {
            const ci = tg.chars.indexOf(targetCh);
            tg.chars.splice(insertBefore ? ci : ci + 1, 0, srcCh);
          }
        }
      }

      serializeKnownDisplayItems(items);
      knownSnapshot = null;
      saveFaded(); renderGlossary();
    }

    // ── Known-words display-items helpers (mirror of the char versions) ───────
    function computeKnownWordsDisplayItems() {
      const items = [];
      for (const w of fadedWordsOrder) {
        const grp = fadedWordGroups.get(w) || '';
        if (!grp) {
          items.push({ type: 'word', word: w });
        } else {
          const last = items[items.length - 1];
          if (last && last.type === 'word-group' && last.name === grp)
            last.words.push(w);
          else
            items.push({ type: 'word-group', name: grp, words: [w] });
        }
      }
      return items;
    }

    function serializeKnownWordsDisplayItems(items) {
      fadedWordsOrder.length = 0;
      fadedWordGroups.clear();
      for (const item of items) {
        if (item.type === 'word') {
          fadedWordsOrder.push(item.word);
        } else {
          for (const w of item.words) {
            fadedWordsOrder.push(w);
            fadedWordGroups.set(w, item.name);
          }
        }
      }
    }

    function applyKnownWordsDrop(targetType, targetWord, targetGroupName, insertBefore) {
      if (!dragInfo) return;
      if (dragInfo.type === 'word-group' && targetType === 'word-group' && dragInfo.groupName === targetGroupName) return;
      if ((dragInfo.type === 'word' || dragInfo.type === 'grouped-word') && dragInfo.word === targetWord) return;
      commitKnownWordsTab();
      const items = computeKnownWordsDisplayItems();

      if (dragInfo.type === 'word-group') {
        const si = items.findIndex(i => i.type === 'word-group' && i.name === dragInfo.groupName);
        if (si < 0) return;
        const [grp] = items.splice(si, 1);
        let ti;
        if (targetType === 'word-group') {
          ti = items.findIndex(i => i.type === 'word-group' && i.name === targetGroupName);
        } else if (targetType === 'word') {
          ti = items.findIndex(i => i.type === 'word' && i.word === targetWord);
        } else {
          ti = items.findIndex(i => i.type === 'word-group' && i.name === targetGroupName);
        }
        if (ti < 0) ti = items.length;
        else if (!insertBefore) ti++;
        items.splice(ti, 0, grp);
      } else {
        const srcWord = dragInfo.word;
        if (dragInfo.type === 'word') {
          const si = items.findIndex(i => i.type === 'word' && i.word === srcWord);
          if (si < 0) return;
          items.splice(si, 1);
        } else {
          const sg = items.find(i => i.type === 'word-group' && i.name === dragInfo.groupName);
          if (!sg) return;
          sg.words.splice(sg.words.indexOf(srcWord), 1);
          if (sg.words.length === 0) items.splice(items.indexOf(sg), 1);
        }
        if (targetType === 'word-group') {
          if (insertBefore) {
            const ti = items.findIndex(i => i.type === 'word-group' && i.name === targetGroupName);
            items.splice(ti < 0 ? items.length : ti, 0, { type: 'word', word: srcWord });
          } else {
            const tg = items.find(i => i.type === 'word-group' && i.name === targetGroupName);
            if (tg) tg.words.unshift(srcWord);
          }
        } else if (targetType === 'word') {
          const ti = items.findIndex(i => i.type === 'word' && i.word === targetWord);
          const ins = ti < 0 ? items.length : (insertBefore ? ti : ti + 1);
          items.splice(ins, 0, { type: 'word', word: srcWord });
        } else {
          const tg = items.find(i => i.type === 'word-group' && i.name === targetGroupName);
          if (tg) {
            const wi = tg.words.indexOf(targetWord);
            tg.words.splice(insertBefore ? wi : wi + 1, 0, srcWord);
          }
        }
      }
      serializeKnownWordsDisplayItems(items);
      knownWordsSnapshot = null;
      saveFaded(); renderGlossary();
    }

    function renderGlossary() {
      const isKnownTab      = glossaryFilter === 'known-chars';
      const isKnownWordsTab = glossaryFilter === 'known-words';

      // Init/clear virtual state and snapshots for each known tab
      if (isKnownTab) {
        if (!virtualKnown)  virtualKnown  = new Set(fadedChars);
        if (!knownSnapshot) knownSnapshot = fadedCharsOrder.slice();
      } else {
        knownSnapshot = null;
      }
      if (isKnownWordsTab) {
        if (!virtualKnownWords)  virtualKnownWords  = new Set(fadedWords);
        if (!knownWordsSnapshot) knownWordsSnapshot = fadedWordsOrder.slice();
      } else {
        knownWordsSnapshot = null;
      }

      // Build char rows (not needed for known-words tab)
      let rows = [];
      if (isKnownTab) {
        rows = knownSnapshot;
      } else if (!isKnownWordsTab) {
        const all = [...charRank.entries()].sort((a, b) => a[1] - b[1]).map(([ch]) => ch);
        const useParaFreq = glossaryFilter === 'paragraph';
        const useBookFreq = glossaryFilter === 'book' && bookCharFreq.size > 0;
        rows = all.filter(ch =>
          glossaryFilter === 'paragraph' ? paraChars.has(ch) : true
        );
        if (useParaFreq)
          rows.sort((a, b) => (paraCharFreq.get(b) || 0) - (paraCharFreq.get(a) || 0));
        else if (useBookFreq)
          rows.sort((a, b) => (bookCharRank.get(a) || 99999) - (bookCharRank.get(b) || 99999));
      }

      // Stats bar
      if (isKnownWordsTab) {
        document.getElementById('g-stats').textContent =
          `${fadedWords.size} words known · showing ${knownWordsSnapshot.length}`;
      } else {
        const chapterSize = charRank.size;
        document.getElementById('g-stats').textContent =
          `${chapterSize} chars in chapter · ${fadedChars.size} known · ${paraChars.size} in paragraph · showing ${rows.length}`;
      }

      const body = document.getElementById('g-body');
      body.innerHTML = '';
      const isEmpty = isKnownWordsTab ? !knownWordsSnapshot.length : !rows.length;
      if (isEmpty) { body.style.padding = '1rem'; body.textContent = '—'; return; }
      body.style.padding = '';

      const tbl = document.createElement('table');
      tbl.className = 'g-table';

      if (isKnownTab) {
        // ── Known tab: groups-as-units, insert-between drag ───────────────────
        // Returns true if the pointer is in the top half of el's bounding box.
        function aboveMid(e, el) {
          const r = el.getBoundingClientRect();
          return e.clientY < r.top + r.height / 2;
        }

        // Wire up insert-between drag-over visuals and the drop handler.
        // skipWhenGroupDrag: true for grouped-char rows (group drags snap to group boundary instead).
        function setupDrop(tr, targetType, targetCh, targetGroupName) {
          tr.addEventListener('dragover', e => {
            if (!dragInfo) return;
            // When dragging a group, ignore rows inside other groups entirely
            if (dragInfo.type === 'group' && targetType === 'grouped-char') return;
            e.preventDefault();
            const above = aboveMid(e, tr);
            tr.classList.toggle('drop-above', above);
            tr.classList.toggle('drop-below', !above);
          });
          tr.addEventListener('dragleave', () => tr.classList.remove('drop-above', 'drop-below'));
          tr.addEventListener('drop', e => {
            e.preventDefault();
            const before = aboveMid(e, tr);
            tr.classList.remove('drop-above', 'drop-below');
            applyKnownDrop(targetType, targetCh, targetGroupName, before);
          });
        }

        const displayItems = computeKnownDisplayItems();

        for (const item of displayItems) {
          if (item.type === 'group') {
            // ── Group header row ──────────────────────────────────────────────
            const htr = document.createElement('tr'); htr.className = 'g-group-hdr';
            setupDrop(htr, 'group', null, item.name);

            const tdHDrag = document.createElement('td'); tdHDrag.className = 'g-drag-handle';
            tdHDrag.textContent = '≡'; tdHDrag.draggable = true;
            tdHDrag.addEventListener('dragstart', e => {
              e.stopPropagation();
              dragInfo = { type: 'group', groupName: item.name };
              htr.style.opacity = '0.4';
              e.dataTransfer.setDragImage(tdHDrag, e.offsetX, e.offsetY);
            });
            tdHDrag.addEventListener('dragend', () => { dragInfo = null; htr.style.opacity = ''; });
            const tdHName = document.createElement('td'); tdHName.colSpan = 5;
            const nameInput = document.createElement('input');
            nameInput.type = 'text'; nameInput.className = 'g-group-input';
            nameInput.value = item.name;
            nameInput.addEventListener('blur', () => {
              const v = nameInput.value.trim();
              if (!v || v === item.name) { if (!v) nameInput.value = item.name; return; }
              commitKnownTab();
              const its = computeKnownDisplayItems();
              const thisGrp = its.find(i => i.type === 'group' && i.name === item.name);
              if (!thisGrp) return;
              const existing = its.find(i => i.type === 'group' && i.name === v);
              if (existing) { existing.chars.push(...thisGrp.chars); its.splice(its.indexOf(thisGrp), 1); }
              else thisGrp.name = v;
              serializeKnownDisplayItems(its); knownSnapshot = null; saveFaded(); renderGlossary();
            });
            nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });
            tdHName.appendChild(nameInput);
            htr.appendChild(tdHDrag); htr.appendChild(tdHName);
            tbl.appendChild(htr);

            // ── Rows for chars within this group ──────────────────────────────
            for (const ch of item.chars) {
              const words = charToWords.get(ch) || [];
              const tr = document.createElement('tr');
              tr.className = 'g-grouped-char'; tr.dataset.ch = ch;
              setupDrop(tr, 'grouped-char', ch, item.name);

              const tdDrag = document.createElement('td'); tdDrag.className = 'g-drag-handle'; tdDrag.textContent = '⠿';
              const tdCh   = document.createElement('td'); tdCh.className = 'g-td-ch'; tdCh.textContent = ch;
              tdCh.draggable = true;
              tdCh.addEventListener('dragstart', e => {
                e.stopPropagation();
                dragInfo = { type: 'grouped-char', ch, groupName: item.name };
                tr.style.opacity = '0.4';
                e.dataTransfer.setDragImage(tdCh, e.offsetX, e.offsetY);
              });
              tdCh.addEventListener('dragend', () => { dragInfo = null; tr.style.opacity = ''; });
              const tdEmpty = document.createElement('td');
              const tdW = document.createElement('td');
              tdW.appendChild(makeWordChips(words.filter(w => paraWords.has(w.chars.join('')))));

              tr.appendChild(tdDrag); tr.appendChild(tdCh); tr.appendChild(makePinyinCell(ch));
              tr.appendChild(tdEmpty);
              tr.appendChild(makeKnownButton(ch, virtualKnown.has(ch), () => {
                virtualKnown.has(ch) ? virtualKnown.delete(ch) : virtualKnown.add(ch);
                renderGlossary();
              }));
              tr.appendChild(tdW);
              tbl.appendChild(tr);
            }

          } else {
            // ── Ungrouped char row ────────────────────────────────────────────
            const ch = item.ch;
            const words = charToWords.get(ch) || [];
            const tr = document.createElement('tr');
            tr.dataset.ch = ch;
            setupDrop(tr, 'char', ch, null);

            const tdDrag = document.createElement('td'); tdDrag.className = 'g-drag-handle'; tdDrag.textContent = '⠿';
            const tdCh   = document.createElement('td'); tdCh.className = 'g-td-ch'; tdCh.textContent = ch;
            tdCh.draggable = true;
            tdCh.addEventListener('dragstart', e => {
              e.stopPropagation();
              dragInfo = { type: 'char', ch };
              tr.style.opacity = '0.4';
              e.dataTransfer.setDragImage(tdCh, e.offsetX, e.offsetY);
            });
            tdCh.addEventListener('dragend', () => { dragInfo = null; tr.style.opacity = ''; });

            const tdGroup = document.createElement('td');
            const gi = document.createElement('input');
            gi.type = 'text'; gi.className = 'g-group-input'; gi.placeholder = '…'; gi.value = '';
            gi.addEventListener('blur', () => {
              const v = gi.value.trim();
              if (!v) return;
              commitKnownTab();
              const its = computeKnownDisplayItems();
              const si = its.findIndex(i => i.type === 'char' && i.ch === ch);
              if (si < 0) return;
              its.splice(si, 1);
              const eg = its.find(i => i.type === 'group' && i.name === v);
              if (eg) eg.chars.push(ch);
              else its.splice(si, 0, { type: 'group', name: v, chars: [ch] });
              serializeKnownDisplayItems(its); knownSnapshot = null; saveFaded(); renderGlossary();
            });
            gi.addEventListener('keydown', e => { if (e.key === 'Enter') gi.blur(); });
            tdGroup.appendChild(gi);

            const tdW = document.createElement('td');
            tdW.appendChild(makeWordChips(words.filter(w => paraWords.has(w.chars.join('')))));

            tr.appendChild(tdDrag); tr.appendChild(tdCh); tr.appendChild(makePinyinCell(ch));
            tr.appendChild(tdGroup);
            tr.appendChild(makeKnownButton(ch, virtualKnown.has(ch), () => {
              virtualKnown.has(ch) ? virtualKnown.delete(ch) : virtualKnown.add(ch);
              renderGlossary();
            }));
            tr.appendChild(tdW);
            tbl.appendChild(tr);
          }
        }
      } else if (isKnownWordsTab) {
        // ── Known words tab: groups-as-units, insert-between drag ─────────────
        function aboveMidW(e, el) {
          const r = el.getBoundingClientRect();
          return e.clientY < r.top + r.height / 2;
        }
        function setupWordDrop(tr, targetType, targetWord, targetGroupName) {
          tr.addEventListener('dragover', e => {
            if (!dragInfo) return;
            if (dragInfo.type === 'word-group' && targetType === 'grouped-word') return;
            e.preventDefault();
            const above = aboveMidW(e, tr);
            tr.classList.toggle('drop-above', above);
            tr.classList.toggle('drop-below', !above);
          });
          tr.addEventListener('dragleave', () => tr.classList.remove('drop-above', 'drop-below'));
          tr.addEventListener('drop', e => {
            e.preventDefault();
            const before = aboveMidW(e, tr);
            tr.classList.remove('drop-above', 'drop-below');
            applyKnownWordsDrop(targetType, targetWord, targetGroupName, before);
          });
        }

        const wordDisplayItems = computeKnownWordsDisplayItems();

        for (const item of wordDisplayItems) {
          if (item.type === 'word-group') {
            // ── Word-group header row ─────────────────────────────────────────
            const htr = document.createElement('tr'); htr.className = 'g-group-hdr';
            setupWordDrop(htr, 'word-group', null, item.name);

            const tdHDrag = document.createElement('td'); tdHDrag.className = 'g-drag-handle'; tdHDrag.textContent = '≡';
            tdHDrag.draggable = true;
            tdHDrag.addEventListener('dragstart', e => {
              e.stopPropagation();
              dragInfo = { type: 'word-group', groupName: item.name };
              htr.style.opacity = '0.4';
              e.dataTransfer.setDragImage(tdHDrag, e.offsetX, e.offsetY);
            });
            tdHDrag.addEventListener('dragend', () => { dragInfo = null; htr.style.opacity = ''; });
            const tdHName = document.createElement('td'); tdHName.colSpan = 5;
            const nameInput = document.createElement('input');
            nameInput.type = 'text'; nameInput.className = 'g-group-input';
            nameInput.value = item.name;
            nameInput.addEventListener('blur', () => {
              const v = nameInput.value.trim();
              if (!v || v === item.name) { if (!v) nameInput.value = item.name; return; }
              commitKnownWordsTab();
              const its = computeKnownWordsDisplayItems();
              const thisGrp = its.find(i => i.type === 'word-group' && i.name === item.name);
              if (!thisGrp) return;
              const existing = its.find(i => i.type === 'word-group' && i.name === v);
              if (existing) { existing.words.push(...thisGrp.words); its.splice(its.indexOf(thisGrp), 1); }
              else thisGrp.name = v;
              serializeKnownWordsDisplayItems(its); knownWordsSnapshot = null; saveFaded(); renderGlossary();
            });
            nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });
            tdHName.appendChild(nameInput);
            htr.appendChild(tdHDrag); htr.appendChild(tdHName);
            tbl.appendChild(htr);

            // ── Rows for words within this group ──────────────────────────────
            for (const w of item.words) {
              const wd = wordDataByKey.get(w);
              const tr = document.createElement('tr');
              tr.className = 'g-grouped-char';
              setupWordDrop(tr, 'grouped-word', w, item.name);

              const tdDrag = document.createElement('td'); tdDrag.className = 'g-drag-handle'; tdDrag.textContent = '⠿';
              const tdW  = document.createElement('td'); tdW.className  = 'g-td-ch'; tdW.textContent  = w;
              tdW.draggable = true;
              tdW.addEventListener('dragstart', e => {
                e.stopPropagation();
                dragInfo = { type: 'grouped-word', word: w, groupName: item.name };
                tr.style.opacity = '0.4';
                e.dataTransfer.setDragImage(tdW, e.offsetX, e.offsetY);
              });
              tdW.addEventListener('dragend', () => { dragInfo = null; tr.style.opacity = ''; });
              const tdPy = document.createElement('td'); tdPy.className = 'g-td-py'; tdPy.textContent = wd ? wd.pinyins.join('·') : '';
              const tdGl = document.createElement('td'); tdGl.className = 'g-td-gl'; tdGl.textContent = wd ? wd.gloss : '';
              const tdEmpty = document.createElement('td');

              tr.appendChild(tdDrag); tr.appendChild(tdW); tr.appendChild(tdPy); tr.appendChild(tdGl);
              tr.appendChild(tdEmpty);
              tr.appendChild(makeKnownButton(w, virtualKnownWords.has(w), () => {
                virtualKnownWords.has(w) ? virtualKnownWords.delete(w) : virtualKnownWords.add(w);
                renderGlossary();
              }));
              tbl.appendChild(tr);
            }

          } else {
            // ── Ungrouped word row ────────────────────────────────────────────
            const w = item.word;
            const wd = wordDataByKey.get(w);
            const tr = document.createElement('tr');
            setupWordDrop(tr, 'word', w, null);

            const tdDrag = document.createElement('td'); tdDrag.className = 'g-drag-handle'; tdDrag.textContent = '⠿';
            const tdW  = document.createElement('td'); tdW.className  = 'g-td-ch'; tdW.textContent  = w;
            tdW.draggable = true;
            tdW.addEventListener('dragstart', e => {
              e.stopPropagation();
              dragInfo = { type: 'word', word: w };
              tr.style.opacity = '0.4';
              e.dataTransfer.setDragImage(tdW, e.offsetX, e.offsetY);
            });
            tdW.addEventListener('dragend', () => { dragInfo = null; tr.style.opacity = ''; });
            const tdPy = document.createElement('td'); tdPy.className = 'g-td-py'; tdPy.textContent = wd ? wd.pinyins.join('·') : '';
            const tdGl = document.createElement('td'); tdGl.className = 'g-td-gl'; tdGl.textContent = wd ? wd.gloss : '';

            const tdGroup = document.createElement('td');
            const gi = document.createElement('input');
            gi.type = 'text'; gi.className = 'g-group-input'; gi.placeholder = '…'; gi.value = '';
            gi.addEventListener('blur', () => {
              const v = gi.value.trim();
              if (!v) return;
              commitKnownWordsTab();
              const its = computeKnownWordsDisplayItems();
              const si = its.findIndex(i => i.type === 'word' && i.word === w);
              if (si < 0) return;
              its.splice(si, 1);
              const eg = its.find(i => i.type === 'word-group' && i.name === v);
              if (eg) eg.words.push(w);
              else its.splice(si, 0, { type: 'word-group', name: v, words: [w] });
              serializeKnownWordsDisplayItems(its); knownWordsSnapshot = null; saveFaded(); renderGlossary();
            });
            gi.addEventListener('keydown', e => { if (e.key === 'Enter') gi.blur(); });
            tdGroup.appendChild(gi);

            tr.appendChild(tdDrag); tr.appendChild(tdW); tr.appendChild(tdPy); tr.appendChild(tdGl);
            tr.appendChild(tdGroup);
            tr.appendChild(makeKnownButton(w, virtualKnownWords.has(w), () => {
              virtualKnownWords.has(w) ? virtualKnownWords.delete(w) : virtualKnownWords.add(w);
              renderGlossary();
            }));
            tbl.appendChild(tr);
          }
        }

      } else {
        // ── Other tabs: rank + count columns, no drag ─────────────────────────
        const useParaFreq = glossaryFilter === 'paragraph';
        const useBookFreq = glossaryFilter === 'book' && bookCharFreq.size > 0;
        for (let ri = 0; ri < rows.length; ri++) {
          const ch = rows[ri];
          const words = charToWords.get(ch) || [];

          const tr = document.createElement('tr');
          tr.dataset.ch = ch;

          const tdRank = document.createElement('td'); tdRank.className = 'g-td-rank';
          tdRank.textContent = useParaFreq ? (ri + 1)
                             : useBookFreq ? (bookCharRank.get(ch) || '?')
                             : charRank.get(ch);

          const tdCh = document.createElement('td'); tdCh.className = 'g-td-ch';
          tdCh.textContent = ch;
          tdCh.draggable = true;
          tdCh.addEventListener('dragstart', e => {
            dragInfo = { type: 'char', ch };
            tr.style.opacity = '0.4';
            e.dataTransfer.setDragImage(tdCh, e.offsetX, e.offsetY);
          });
          tdCh.addEventListener('dragend', () => { dragInfo = null; tr.style.opacity = ''; });

          const tdN = document.createElement('td'); tdN.className = 'g-td-n';
          tdN.textContent = useParaFreq ? (paraCharFreq.get(ch) || '')
                          : useBookFreq ? (bookCharFreq.get(ch) || '')
                          : charFreq.get(ch);

          const tdW = document.createElement('td');
          const scopedWords = useParaFreq
            ? words.filter(w => paraWords.has(w.chars.join('')))
            : words;
          tdW.appendChild(makeWordChips(scopedWords));

          tr.appendChild(tdRank); tr.appendChild(tdCh); tr.appendChild(makePinyinCell(ch));
          tr.appendChild(tdN);
          tr.appendChild(makeKnownButton(ch, fadedChars.has(ch), () => {
            toggleKnownChar(ch); saveFaded(); applyFaded(); renderGlossary();
          }));
          tr.appendChild(tdW);
          tbl.appendChild(tr);
        }
      }
      body.appendChild(tbl);
    }

    document.getElementById('btn-glossary').addEventListener('click', () => {
      document.getElementById('g-overlay').classList.add('open');
      renderGlossary();
    });
    function clearWordPin() {
      if (clearPinListener) {
        document.removeEventListener('click', clearPinListener);
        clearPinListener = null;
      }
      for (const div of (wordsByKey.get(pinnedWordKey) || []))
        div.classList.remove('word-pinned');
      pinnedWordKey = null;
    }

    function pinWord(wordKey) {
      clearWordPin();
      pinnedWordKey = wordKey;
      const divs = wordsByKey.get(wordKey) || [];
      for (const div of divs) div.classList.add('word-pinned');
      if (divs[0]) divs[0].scrollIntoView({ block: 'center' });
      clearPinListener = () => clearWordPin();
      document.addEventListener('click', clearPinListener, { once: true });
    }

    function commitKnownTab() {
      if (!virtualKnown) return;
      // Apply pending removes (chars in fadedChars but toggled off in virtualKnown)
      for (const ch of [...fadedChars])
        if (!virtualKnown.has(ch)) removeKnownChar(ch);
      // Apply pending adds (chars toggled on that weren't in fadedChars — rare, but safe)
      for (const ch of virtualKnown)
        if (!fadedChars.has(ch)) addKnownChar(ch);
      virtualKnown = null;
      saveFaded(); applyFaded();
    }

    function commitKnownWordsTab() {
      if (!virtualKnownWords) return;
      for (const w of [...fadedWords])
        if (!virtualKnownWords.has(w)) removeKnownWord(w);
      for (const w of virtualKnownWords)
        if (!fadedWords.has(w)) addKnownWord(w);
      virtualKnownWords = null;
      saveFaded(); applyFaded();
    }

    function closeGlossary() {
      commitKnownTab();
      commitKnownWordsTab();
      knownSnapshot = null;
      knownWordsSnapshot = null;
      document.getElementById('g-overlay').classList.remove('open');
    }
    document.getElementById('g-close').addEventListener('click', closeGlossary);
    document.getElementById('g-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('g-overlay')) closeGlossary();
    });
    document.querySelectorAll('.g-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        commitKnownTab();
        commitKnownWordsTab();
        document.querySelectorAll('.g-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        glossaryFilter = btn.dataset.f;
        renderGlossary();
      });

      // Accept char drags — switch to that tab and highlight the char's row
      btn.addEventListener('dragover', e => {
        if (!dragInfo || !dragInfo.ch || btn.dataset.f === 'known-words') return;
        e.preventDefault();
        btn.classList.add('drag-target');
      });
      btn.addEventListener('dragleave', () => btn.classList.remove('drag-target'));
      btn.addEventListener('drop', e => {
        e.preventDefault();
        btn.classList.remove('drag-target');
        if (!dragInfo || !dragInfo.ch) return;
        const ch = dragInfo.ch;
        commitKnownTab();
        commitKnownWordsTab();
        document.querySelectorAll('.g-filter').forEach(b => b.classList.toggle('active', b === btn));
        glossaryFilter = btn.dataset.f;
        renderGlossary();
        const row = document.querySelector('#g-body tr[data-ch="' + ch + '"]');
        if (row) {
          row.scrollIntoView({ block: 'center' });
          row.classList.add('g-highlight');
          setTimeout(() => row.classList.remove('g-highlight'), 1800);
        }
      });
    });

    function openGlossaryForChar(ch) {
      glossaryFilter = 'paragraph';
      document.querySelectorAll('.g-filter').forEach(b =>
        b.classList.toggle('active', b.dataset.f === 'paragraph'));
      document.getElementById('g-overlay').classList.add('open');
      renderGlossary();
      const row = document.querySelector('#g-body tr[data-ch="' + ch + '"]');
      if (row) {
        row.scrollIntoView({ block: 'center' });
        row.classList.add('g-highlight');
        setTimeout(() => row.classList.remove('g-highlight'), 1800);
      }
    }

    // ── Glossary actions ─────────────────────────────────────────────────────
    document.getElementById('g-download').addEventListener('click', () => {
      const payload = {
        chars:      fadedCharsOrder,
        charGroups: Object.fromEntries(fadedCharGroups),
        words:      fadedWordsOrder,
        wordGroups: Object.fromEntries(fadedWordGroups)
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'known.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
    document.getElementById('g-load-trigger').addEventListener('click', () =>
      document.getElementById('g-load-input').click());
    document.getElementById('g-load-input').addEventListener('change', function () {
      const file = this.files[0]; if (!file) return;
      const fr = new FileReader();
      fr.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          // Support new {chars,charGroups,words,wordGroups}, legacy {pinyin,gloss}, bare array (chars only)
          const charsArr      = Array.isArray(data) ? data : (data.chars  || data.pinyin || []);
          const wordsArr      = Array.isArray(data) ? []   : (data.words  || data.gloss  || []);
          const charGroupsObj = Array.isArray(data) ? {}   : (data.charGroups || {});
          const wordGroupsObj = Array.isArray(data) ? {}   : (data.wordGroups || {});
          virtualKnown = null; virtualKnownWords = null;
          knownSnapshot = null; knownWordsSnapshot = null;
          fadedCharsOrder.length = 0; fadedChars.clear(); fadedCharGroups.clear();
          for (const ch of charsArr)
            if (typeof ch === 'string' && ch && !fadedChars.has(ch))
              { fadedChars.add(ch); fadedCharsOrder.push(ch); }
          for (const [ch, g] of Object.entries(charGroupsObj))
            if (typeof g === 'string' && g) fadedCharGroups.set(ch, g);
          fadedWordsOrder.length = 0; fadedWords.clear(); fadedWordGroups.clear();
          for (const w of wordsArr)
            if (typeof w === 'string' && w && !fadedWords.has(w))
              { fadedWords.add(w); fadedWordsOrder.push(w); }
          for (const [w, g] of Object.entries(wordGroupsObj))
            if (typeof g === 'string' && g) fadedWordGroups.set(w, g);
          saveFaded(); applyFaded(); renderGlossary();
        } catch (ex) { alert('Could not load file: ' + ex.message); }
      };
      fr.readAsText(file); this.value = '';
    });
    document.getElementById('g-clear').addEventListener('click', () => {
      if (!confirm('Clear all known characters and words?')) return;
      virtualKnown = null; virtualKnownWords = null;
      knownSnapshot = null; knownWordsSnapshot = null;
      fadedCharsOrder.length = 0; fadedChars.clear(); fadedCharGroups.clear();
      fadedWordsOrder.length = 0; fadedWords.clear(); fadedWordGroups.clear();
      saveFaded(); applyFaded(); renderGlossary();
    });

    // Apply persisted modes immediately (before data loads)
    applyModes();

    // Copy: strip block-level newlines
    document.addEventListener('copy', e => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) return;
      e.clipboardData.setData('text/plain', sel.toString().replace(/\s+/g, ''));
      e.preventDefault();
    });

    // ── Selection TTS ─────────────────────────────────────────────────────────
    // contextmenu fires on Android long-press and is a valid user-gesture for
    // speech synthesis; touchend is not (long-press fires touchcancel instead).
    if ('ontouchstart' in window) {
      document.addEventListener('contextmenu', e => {
        e.preventDefault();
        setTimeout(() => {
          const sel = window.getSelection();
          if (!sel || sel.isCollapsed) return;
          const text = sel.toString().replace(/\s+/g, '');
          if (!text) return;
          speak(text, null, 0.7);
        }, 300);
      });
    }
  </script>
</body>
</html>
